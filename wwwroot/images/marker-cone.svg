      M19,52
      C19,52 16,48 17,44
      C18,40 23,40 23,37
      C23,34 18,33 18,28
      C18,23 22,21 24,19
      C26,17 25,14 27,11
      C29,8 30,6 30,6
      C30,6 31,8 33,11
      C35,14 34,17 36,19
      C38,21 42,23 42,28
      C42,33 37,34 37,37
      C37,40 42,40 43,44
      C44,48 41,52 41,52
      Z
    " fill="#eaf2fb" stroke="#2b4f7e" stroke-width="3"/>

    <!-- Swirl detail lines inside the soft-serve -->
    <path d="M21,47 C24,44 36,44 39,47" stroke-width="2" opacity="0.45"/>
    <path d="M20,40 C23,37.5 37,37.5 40,40" stroke-width="2" opacity="0.45"/>
