    <polygon points="18,52 42,52 30,80" fill="#eaf2fb" stroke="#2b4f7e" stroke-width="3"/>
    <!-- Cone cross-hatch lines -->
    <line x1="22" y1="58" x2="33" y2="73" opacity="0.5"/>
    <line x1="38" y1="58" x2="27" y2="73" opacity="0.5"/>
    <line x1="20" y1="58" x2="40" y2="58" opacity="0.4"/>
    <line x1="23" y1="64" x2="37" y2="64" opacity="0.4"/>

    <!-- Soft-serve body - three bulging layers -->
